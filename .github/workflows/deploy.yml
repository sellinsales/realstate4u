name: Deploy to cPanel

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Generate Prisma client
      run: npx prisma generate

    - name: Build application
      run: npm run build

    - name: Update Passenger restart marker
      run: |
        mkdir -p tmp
        echo "${GITHUB_SHA} $(date -u +'%Y-%m-%dT%H:%M:%SZ')" > tmp/restart.txt

    - name: Deploy via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: 108.163.234.178
        username: realstate4u@realstate4u.com
        password: ${{ secrets.CPANEL_PASSWORD }}
        protocol: ftps
        local-dir: ./
        server-dir: public_html/rs4u/
        exclude: |
          .git*
          .github*
          node_modules/**
          .next/cache/**
          .env*
          CLOUDLINUX_NODEJS_FIX.md
          DEPLOYMENT.md
          TROUBLESHOOTING_PASSENGER.md
          *.log
